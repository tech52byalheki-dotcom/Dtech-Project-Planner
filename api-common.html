<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dtech — API Reference: dtechcommonserver</title>
<style>
  :root {
    --bg: #f6f8fa;
    --surface: #ffffff;
    --surface2: #f6f8fa;
    --surface3: #eaeef2;
    --border: #d0d7de;
    --text: #1f2328;
    --text-muted: #57606a;
    --accent-blue: #0969da;
    --accent-green: #1a7f37;
    --accent-orange: #9a6700;
    --accent-purple: #8250df;
    --accent-red: #cf222e;
    --panel-w: 460px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
  }

  /* ── NAV ── */
  .topnav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .topnav-brand {
    display: flex; align-items: center; gap: 10px;
    font-size: 18px; font-weight: 700; color: var(--accent-blue);
    text-decoration: none;
  }
  .topnav-brand .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent-green); animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.4)} }
  .topnav-links { display: flex; gap: 6px; }
  .topnav-links a {
    padding: 6px 14px; border-radius: 6px;
    color: var(--text-muted); text-decoration: none;
    font-size: 13px; transition: background .15s, color .15s;
  }
  .topnav-links a:hover, .topnav-links a.active { background: var(--surface2); color: var(--text); }

  /* ── LAYOUT ── */
  .layout { display: flex; height: calc(100vh - 53px); }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 230px; flex-shrink: 0;
    background: var(--surface); border-right: 1px solid var(--border);
    overflow-y: auto; display: flex; flex-direction: column;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sidebar-search {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-search input {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 7px;
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border-color .15s;
  }
  .sidebar-search input:focus { border-color: var(--accent-blue); }
  .sidebar-search input::placeholder { color: var(--text-muted); }

  .sidebar-groups { flex: 1; overflow-y: auto; padding: 8px 0; }

  .sg { margin-bottom: 2px; }
  .sg-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 14px; cursor: pointer;
    font-size: 11px; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; color: var(--text-muted);
    user-select: none;
    transition: color .12s;
  }
  .sg-header:hover { color: var(--text); }
  .sg-header .sg-count {
    font-size: 10px; font-weight: 600;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 1px 6px; color: var(--text-muted);
  }
  .sg-header .sg-chevron { font-size: 10px; transition: transform .15s; }
  .sg.collapsed .sg-chevron { transform: rotate(-90deg); }
  .sg.collapsed .sg-items { display: none; }

  .sg-items {}
  .sg-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 14px 6px 20px;
    cursor: pointer; font-size: 12px; color: var(--text-muted);
    transition: background .1s, color .1s;
    border-left: 2px solid transparent;
  }
  .sg-item:hover { background: var(--surface2); color: var(--text); }
  .sg-item.active {
    background: rgba(9,105,218,.06); color: var(--accent-blue);
    border-left-color: var(--accent-blue); font-weight: 600;
  }
  .sg-item.hidden { display: none; }

  /* ── MAIN CONTENT ── */
  .content {
    flex: 1; overflow-y: auto; padding: 24px 32px;
    transition: margin-right .25s;
  }
  .content.panel-open { margin-right: var(--panel-w); }
  .content::-webkit-scrollbar { width: 6px; }
  .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .content-header { margin-bottom: 28px; }
  .content-header h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .content-header p { color: var(--text-muted); font-size: 13px; }
  .server-badge {
    display: inline-flex; align-items: center; gap: 8px;
    margin-top: 10px; padding: 6px 12px;
    background: rgba(9,105,218,.08); border: 1px solid rgba(9,105,218,.2);
    border-radius: 8px; font-size: 12px; font-weight: 600; color: var(--accent-blue);
  }
  .server-badge .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent-green); animation: pulse 2s infinite;
  }

  /* ── GROUP SECTION ── */
  .api-group {
    margin-bottom: 40px;
    scroll-margin-top: 24px;
  }
  .api-group.hidden { display: none; }

  .api-group-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px; padding-bottom: 10px;
    border-bottom: 2px solid var(--border);
  }
  .api-group-icon {
    width: 34px; height: 34px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .api-group-title { font-size: 16px; font-weight: 700; }
  .api-group-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .api-group-base {
    margin-left: auto; font-size: 11px; font-weight: 600;
    font-family: 'SF Mono', monospace;
    background: var(--surface2); border: 1px solid var(--border);
    padding: 3px 8px; border-radius: 5px; color: var(--text-muted);
    white-space: nowrap;
  }

  /* ── ENDPOINT ROW ── */
  .endpoint-list { display: flex; flex-direction: column; gap: 6px; }

  .endpoint-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; cursor: pointer;
    transition: border-color .12s, box-shadow .12s;
  }
  .endpoint-row:hover { border-color: var(--accent-blue); box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .endpoint-row.active { border-color: var(--accent-blue); background: rgba(9,105,218,.03); box-shadow: 0 0 0 3px rgba(9,105,218,.08); }
  .endpoint-row.hidden { display: none; }

  .method {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 52px; padding: 3px 8px;
    border-radius: 5px; font-size: 11px; font-weight: 700;
    font-family: 'SF Mono', monospace; flex-shrink: 0;
  }
  .method-get    { background: rgba(26,127,55,.12);  color: #1a7f37; }
  .method-post   { background: rgba(9,105,218,.12);  color: #0969da; }
  .method-put    { background: rgba(154,103,0,.12);  color: #9a6700; }
  .method-patch  { background: rgba(130,80,223,.12); color: #8250df; }
  .method-delete { background: rgba(207,34,46,.12);  color: #cf222e; }

  .ep-path {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px; color: var(--text); flex: 1;
  }
  .ep-path .ep-param { color: var(--accent-orange); }
  .ep-desc { font-size: 12px; color: var(--text-muted); }
  .ep-auth {
    font-size: 10px; padding: 2px 6px;
    border-radius: 4px; font-weight: 600;
    flex-shrink: 0; white-space: nowrap;
  }
  .auth-admin  { background: rgba(9,105,218,.1);  color: var(--accent-blue);   border: 1px solid rgba(9,105,218,.2);  }
  .auth-vendor { background: rgba(154,103,0,.1);  color: var(--accent-orange); border: 1px solid rgba(154,103,0,.2);  }
  .auth-driver { background: rgba(130,80,223,.1); color: var(--accent-purple); border: 1px solid rgba(130,80,223,.2); }
  .auth-none   { background: rgba(87,96,106,.1);  color: var(--text-muted);    border: 1px solid rgba(87,96,106,.2);  }
  .auth-super  { background: rgba(207,34,46,.1);  color: var(--accent-red);    border: 1px solid rgba(207,34,46,.2);  }

  .ep-click { font-size: 10px; color: var(--accent-blue); margin-left: 4px; flex-shrink: 0; }

  /* ── SIDE PANEL ── */
  .panel {
    position: fixed; top: 53px; right: 0;
    width: var(--panel-w); height: calc(100vh - 53px);
    background: var(--surface); border-left: 1px solid var(--border);
    z-index: 200;
    transform: translateX(100%);
    transition: transform .25s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column;
  }
  .panel.open { transform: translateX(0); }

  .panel-header {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2); flex-shrink: 0;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  }
  .ph-left { display: flex; align-items: flex-start; gap: 10px; }
  .ph-method { flex-shrink: 0; margin-top: 2px; }
  .ph-path {
    font-family: 'SF Mono', monospace; font-size: 14px; font-weight: 700;
    word-break: break-all; margin-bottom: 3px;
  }
  .ph-desc { font-size: 12px; color: var(--text-muted); }
  .panel-close {
    background: none; border: 1px solid var(--border);
    color: var(--text-muted); width: 28px; height: 28px;
    border-radius: 6px; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s; flex-shrink: 0;
  }
  .panel-close:hover { background: var(--surface3); color: var(--text); }

  .panel-body { flex: 1; overflow-y: auto; padding: 0; }
  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .ps { padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .ps:last-child { border-bottom: none; }
  .ps-title {
    font-size: 10px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px;
  }

  .kv-list { display: flex; flex-direction: column; gap: 7px; }
  .kv { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .kv-key { color: var(--text-muted); font-size: 12px; min-width: 80px; flex-shrink: 0; }
  .kv-val { font-size: 12px; text-align: right; word-break: break-word; }

  code {
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px;
    background: var(--surface2); border: 1px solid var(--border);
    padding: 2px 5px; border-radius: 4px; color: var(--accent-blue);
  }
  .code-block {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px;
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px;
    color: var(--text); line-height: 1.7; white-space: pre; overflow-x: auto;
  }

  .param-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .param-table th {
    text-align: left; padding: 6px 8px;
    background: var(--surface2); color: var(--text-muted);
    font-weight: 600; font-size: 11px;
    border-bottom: 1px solid var(--border);
  }
  .param-table td { padding: 7px 8px; border-bottom: 1px solid var(--surface2); vertical-align: top; }
  .param-table tr:last-child td { border-bottom: none; }
  .param-name { font-family: 'SF Mono', monospace; color: var(--text); font-weight: 600; }
  .param-type { color: var(--accent-purple); font-family: monospace; font-size: 11px; }
  .param-req { color: var(--accent-red); font-size: 10px; font-weight: 700; }
  .param-opt { color: var(--text-muted); font-size: 10px; }

  @media (max-width: 900px) {
    .sidebar { display: none; }
    .content.panel-open { margin-right: 0; }
    .panel { width: 100vw; }
  }
</style>
</head>
<body>

<nav class="topnav">
  <a href="index.html" class="topnav-brand">
    <img src="logo.png" alt="D Tech Creative" style="height:32px;width:auto" />
  </a>
  <div class="topnav-links">

</nav>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-search">
      <input type="text" id="search-input" placeholder="Search endpoints…" oninput="filterEndpoints(this.value)">
    </div>
    <div class="sidebar-groups" id="sidebar-groups">
      <!-- populated by JS -->
    </div>
  </aside>

  <!-- CONTENT -->
  <main class="content" id="content">

    <div class="content-header">
      <h1>dtechcommonserver — API Reference</h1>
      <p>Admin, Vendor, Driver and Common APIs. Click any endpoint for request/response details.</p>
      <div class="server-badge">
        <span class="live-dot"></span>
        http://&lt;host&gt;:3001
        &nbsp;·&nbsp; Express 5 + TypeScript &nbsp;·&nbsp; JWT Auth
      </div>
    </div>

    <div id="api-groups">
      <!-- rendered by JS -->
    </div>

  </main>
</div>

<!-- SIDE PANEL -->
<div class="panel" id="panel">
  <div class="panel-header">
    <div class="ph-left">
      <span class="ph-method" id="ph-method"></span>
      <div>
        <div class="ph-path" id="ph-path">/path</div>
        <div class="ph-desc" id="ph-desc">Description</div>
      </div>
    </div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<script>
/* ════════════════════════════════════════════════
   API DATA
════════════════════════════════════════════════ */
const GROUPS = [
  {
    id: 'admin-auth',
    icon: '🔐', color: 'rgba(9,105,218,.1)',
    title: 'Admin Auth',
    sub: 'Login, token refresh, logout',
    base: '/admin/v1',
    endpoints: [
      {
        method:'POST', path:'/login', auth:'none',
        desc:'Admin login with email + password',
        params:[
          { name:'email',    type:'string',  req:true,  desc:'Admin email address' },
          { name:'password', type:'string',  req:true,  desc:'Plain text password (bcrypt compared server-side)' }
        ],
        response:`{
  token: string,          // JWT access token (24h)
  // refreshToken: set as HTTP-only cookie (7d)
}`,
        notes:'Token payload: { adminId, role, email }. Roles: SuperAdmin | Admin. Middleware: AdminTokenAuthenticator.ts.'
      },
      {
        method:'POST', path:'/refresh-token', auth:'cookie',
        desc:'Exchange refresh cookie for new access token',
        params:[], response:`{ token: string }`,
        notes:'Refresh cookie is HTTP-only — sent automatically by the browser. Call this on 401 responses, then retry the original request.'
      },
      {
        method:'POST', path:'/logout', auth:'admin',
        desc:'Invalidate session — clears refresh cookie',
        params:[], response:`{ message: "Logged out" }`,
        notes:''
      }
    ]
  },
  {
    id: 'admin-mgmt',
    icon: '👤', color: 'rgba(9,105,218,.1)',
    title: 'Admin Management',
    sub: 'CRUD for admin users',
    base: '/admin/v1/admins',
    endpoints: [
      { method:'GET',    path:'/',             auth:'admin', desc:'List all admin users', params:[], response:`{ admins: [{ adminId, email, role, created_at }] }`, notes:'' },
      { method:'POST',   path:'/',             auth:'super', desc:'Create a new admin user',
        params:[
          { name:'email',    type:'string', req:true,  desc:'Admin email' },
          { name:'password', type:'string', req:true,  desc:'Initial password' },
          { name:'role',     type:'string', req:true,  desc:'Admin | SuperAdmin' }
        ],
        response:`{ adminId, email, role }`, notes:'SuperAdmin only.' },
      { method:'GET',    path:'/:adminId',     auth:'admin', desc:'Get admin details', params:[], response:`{ adminId, email, role, created_at }`, notes:'' },
      { method:'PUT',    path:'/:adminId',     auth:'admin', desc:'Update admin info (name, email)',
        params:[{ name:'email', type:'string', req:false, desc:'New email' }],
        response:`{ adminId, email }`, notes:'' },
      { method:'DELETE', path:'/:adminId',     auth:'super', desc:'Delete admin account', params:[], response:`{ message: "Deleted" }`, notes:'SuperAdmin only.' },
      { method:'PATCH',  path:'/:adminId/role',auth:'super', desc:'Change admin role',
        params:[{ name:'role', type:'string', req:true, desc:'Admin | SuperAdmin' }],
        response:`{ adminId, role }`, notes:'SuperAdmin only.' }
    ]
  },
  {
    id: 'vendor-mgmt',
    icon: '🏪', color: 'rgba(154,103,0,.1)',
    title: 'Vendor Management',
    sub: 'Admin CRUD + document verification',
    base: '/admin/v1/vendors',
    endpoints: [
      { method:'GET',   path:'/',                  auth:'admin', desc:'List vendors — supports city, status, search filters',
        params:[
          { name:'city',   type:'string', req:false, desc:'Filter by city' },
          { name:'status', type:'string', req:false, desc:'active | inactive | unverified' },
          { name:'search', type:'string', req:false, desc:'Search by name or phone' },
          { name:'page',   type:'number', req:false, desc:'Pagination page' },
          { name:'limit',  type:'number', req:false, desc:'Results per page' }
        ],
        response:`{ vendors: [...], total, page, limit }`, notes:'' },
      { method:'GET',   path:'/:vendorId',          auth:'admin', desc:'Full vendor profile with document URLs',
        params:[], response:`{ vendor_id, name, gstFile, tradeLicenseFile, isDocumentVerified, ... }`, notes:'' },
      { method:'POST',  path:'/',                   auth:'admin', desc:'Create vendor manually',
        params:[
          { name:'name',       type:'string', req:true, desc:'Business name' },
          { name:'phone',      type:'string', req:true, desc:'Phone number' },
          { name:'password',   type:'string', req:true, desc:'Initial password' },
          { name:'email',      type:'string', req:false, desc:'Email' },
          { name:'warehouse_id', type:'number', req:false, desc:'Assign to warehouse' }
        ],
        response:`{ vendor_id }`, notes:'' },
      { method:'PUT',   path:'/:vendorId',          auth:'admin', desc:'Update vendor details',
        params:[{ name:'...fields', type:'mixed', req:false, desc:'Any vendor column' }],
        response:`{ vendor_id }`, notes:'' },
      { method:'DELETE',path:'/:vendorId',          auth:'super', desc:'Remove vendor permanently',
        params:[], response:`{ message: "Deleted" }`, notes:'SuperAdmin only.' },
      { method:'POST',  path:'/verify',             auth:'admin', desc:'Approve or reject vendor documents',
        params:[
          { name:'vendor_id',          type:'number',  req:true,  desc:'Target vendor' },
          { name:'isDocumentVerified', type:'boolean', req:true,  desc:'true = approved, false = rejected' },
          { name:'remarks',            type:'string',  req:false, desc:'Required on rejection' }
        ],
        response:`{ vendor_id, isDocumentVerified }`, notes:'' },
      { method:'PATCH', path:'/:vendorId/status',   auth:'admin', desc:'Activate or deactivate vendor',
        params:[{ name:'isActive', type:'boolean', req:true, desc:'true = active, false = suspended' }],
        response:`{ vendor_id, isActive }`, notes:'' }
    ]
  },
  {
    id: 'driver-mgmt',
    icon: '🚗', color: 'rgba(130,80,223,.1)',
    title: 'Driver Management',
    sub: 'Admin verification + performance tracking',
    base: '/admin/v1/drivers',
    endpoints: [
      { method:'GET',  path:'/drivers',                     auth:'admin', desc:'List all drivers with filters',

      { method:'GET',  path:'/drivers/:driverId',           auth:'admin', desc:'Driver profile + document URLs',

      { method:'PUT',  path:'/drivers/:driverId/verify',    auth:'admin', desc:'Approve driver documents',

      { method:'PUT',  path:'/drivers/:driverId/reject',    auth:'admin', desc:'Reject driver with reason',

      { method:'PUT',  path:'/drivers/:driverId/remarks',   auth:'admin', desc:'Add admin remarks to driver profile',

      { method:'GET',  path:'/drivers/:driverId/analytics', auth:'admin', desc:'Driver delivery performance stats',

      { method:'GET',  path:'/drivers/:driverId/payouts',   auth:'admin', desc:'Driver payout history',

  },
  {
    id: 'vendor-orders',
    icon: '📋', color: 'rgba(130,80,223,.1)',
    title: 'Vendor Orders (Admin)',

    endpoints: [
      { method:'GET',  path:'/incoming',          auth:'admin', desc:'All pending vendor orders',
        params:[], response:`{ orders: [{ order_id, vendor, warehouse, products, order_status, created_at }] }`, notes:'' },
      { method:'POST', path:'/approve',           auth:'admin', desc:'Approve a vendor order',
        params:[{ name:'order_id', type:'number', req:true, desc:'Order to approve' }],
        response:`{ order_id, order_status: "approved" }`, notes:'Inventory quantities updated on approval.' },
      { method:'POST', path:'/reject',            auth:'admin', desc:'Reject a vendor order',
        params:[
          { name:'order_id', type:'number', req:true,  desc:'Order to reject' },
          { name:'remarks',  type:'string', req:false, desc:'Rejection reason' }
        ],
        response:`{ order_id, order_status: "rejected" }`, notes:'' },

function renderAll() {
  const sidebar = document.getElementById('sidebar-groups');
  const main    = document.getElementById('api-groups');
  let sHTML = '', mHTML = '';

  GROUPS.forEach(g => {
    // sidebar
    const itemsHTML = g.endpoints.map((ep, i) =>
      `<div class="sg-item" id="si-${g.id}-${i}"
            onclick="selectEndpoint('${g.id}',${i})"
            data-search="${ep.method} ${ep.path} ${ep.desc}">
        <span class="method method-${ep.method.toLowerCase()}" style="font-size:9px;padding:1px 4px">${ep.method}</span>
        <span style="font-size:11px;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ep.path}</span>
      </div>`
    ).join('');

    sHTML += `
      <div class="sg" id="sg-${g.id}">
        <div class="sg-header" onclick="toggleGroup('${g.id}')">
          <span>${g.title}</span>
          <span style="display:flex;align-items:center;gap:6px">
            <span class="sg-count">${g.endpoints.length}</span>
            <span class="sg-chevron">▾</span>
          </span>
        </div>
        <div class="sg-items">${itemsHTML}</div>
      </div>`;

    // main content
    const epsHTML = g.endpoints.map((ep, i) => {
      const authClass = { 'admin':'auth-admin','vendor':'auth-vendor','driver':'auth-driver','none':'auth-none','super':'auth-super','cookie':'auth-none' }[ep.auth] || 'auth-none';
      const authLabel = { 'admin':'Admin JWT','vendor':'Vendor JWT','driver':'Driver JWT','none':'No Auth','super':'SuperAdmin','cookie':'Cookie' }[ep.auth] || ep.auth;
      const pathHtml = ep.path.replace(/:([a-zA-Z_]+)/g, '<span class="ep-param">:$1</span>');
      return `<div class="endpoint-row" id="ep-${g.id}-${i}"
                   data-group="${g.id}" data-idx="${i}"
                   data-search="${ep.method} ${g.base}${ep.path} ${ep.desc}"
                   onclick="selectEndpoint('${g.id}',${i})">
        <span class="method method-${ep.method.toLowerCase()}">${ep.method}</span>
        <span class="ep-path"><span style="color:var(--text-muted)">${g.base}</span>${pathHtml}</span>
        <span class="ep-desc">${ep.desc}</span>
        <span class="ep-auth ${authClass}">${authLabel}</span>
        <span class="ep-click">→</span>
      </div>`;
    }).join('');

    mHTML += `
      <div class="api-group" id="ag-${g.id}">
        <div class="api-group-header">
          <div class="api-group-icon" style="background:${g.color}">${g.icon}</div>
          <div>
            <div class="api-group-title">${g.title}</div>
            <div class="api-group-sub">${g.sub}</div>
          </div>
          <div class="api-group-base">${g.base}</div>
        </div>
        <div class="endpoint-list">${epsHTML}</div>
      </div>`;
  });

  sidebar.innerHTML = sHTML;
  main.innerHTML    = mHTML;
}

/* ════════════════════════════════════════════════
   INTERACTIONS
════════════════════════════════════════════════ */
function toggleGroup(id) {
  document.getElementById('sg-' + id).classList.toggle('collapsed');
}

let activeGroup = null, activeIdx = null;

function selectEndpoint(groupId, idx) {
  const group = GROUPS.find(g => g.id === groupId);
  if (!group) return;
  const ep = group.endpoints[idx];
  if (!ep) return;

  // highlight
  document.querySelectorAll('.endpoint-row, .sg-item').forEach(el => el.classList.remove('active'));
  const row  = document.getElementById('ep-' + groupId + '-' + idx);
  const srow = document.getElementById('si-' + groupId + '-' + idx);
  if (row)  row.classList.add('active');
  if (srow) srow.classList.add('active');

  activeGroup = groupId; activeIdx = idx;

  // panel header
  const authLabel = { 'admin':'Admin JWT','vendor':'Vendor JWT','driver':'Driver JWT','none':'No Auth','super':'SuperAdmin JWT','cookie':'Refresh Cookie' }[ep.auth] || ep.auth;
  const authClass = { 'admin':'auth-admin','vendor':'auth-vendor','driver':'auth-driver','none':'auth-none','super':'auth-super','cookie':'auth-none' }[ep.auth] || 'auth-none';

  document.getElementById('ph-method').innerHTML = `<span class="method method-${ep.method.toLowerCase()}">${ep.method}</span>`;
  document.getElementById('ph-path').innerHTML   = `<span style="color:var(--text-muted)">${group.base}</span>${ep.path.replace(/:([a-zA-Z_]+)/g,'<span style="color:var(--accent-orange)">:$1</span>')}`;
  document.getElementById('ph-desc').textContent = ep.desc;

  // panel body
  let html = `
    <div class="ps">
      <div class="ps-title">Endpoint</div>
      <div class="kv-list">
        <div class="kv"><span class="kv-key">Method</span><span class="kv-val"><span class="method method-${ep.method.toLowerCase()}">${ep.method}</span></span></div>
        <div class="kv"><span class="kv-key">Full path</span><span class="kv-val"><code>${group.base}${ep.path}</code></span></div>
        <div class="kv"><span class="kv-key">Auth</span><span class="kv-val"><span class="ep-auth ${authClass}">${authLabel}</span></span></div>
        <div class="kv"><span class="kv-key">Server</span><span class="kv-val">dtechcommonserver · Port 3001</span></div>
      </div>
    </div>`;

  if (ep.params && ep.params.length) {
    html += `<div class="ps"><div class="ps-title">Parameters</div>
      <table class="param-table">
        <tr><th>Name</th><th>Type</th><th>Req</th><th>Description</th></tr>
        ${ep.params.map(p => `<tr>
          <td class="param-name">${p.name}</td>
          <td class="param-type">${p.type}</td>
          <td>${p.req ? '<span class="param-req">●</span>' : '<span class="param-opt">○</span>'}</td>
          <td style="color:var(--text-muted);font-size:12px">${p.desc}</td>
        </tr>`).join('')}
      </table>
    </div>`;
  }

  if (ep.response) {
    html += `<div class="ps"><div class="ps-title">Response</div>
      <div class="code-block">${escHtml(ep.response)}</div>
    </div>`;
  }

  if (ep.notes) {
    html += `<div class="ps"><div class="ps-title">Notes</div>
      <div style="font-size:12px;color:var(--text-muted);line-height:1.6">${ep.notes}</div>
    </div>`;
  }

  document.getElementById('panel-body').innerHTML = html;
  document.getElementById('panel').classList.add('open');
  document.getElementById('content').classList.add('panel-open');
  if (row) row.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('content').classList.remove('panel-open');
  document.querySelectorAll('.endpoint-row, .sg-item').forEach(el => el.classList.remove('active'));
  activeGroup = null; activeIdx = null;
}

/* search */
function filterEndpoints(q) {
  const term = q.toLowerCase().trim();
  let anyVisible = {};
  GROUPS.forEach(g => { anyVisible[g.id] = false; });

  document.querySelectorAll('.endpoint-row').forEach(el => {
    const s = el.getAttribute('data-search').toLowerCase();
    const show = !term || s.includes(term);
    el.classList.toggle('hidden', !show);
    if (show) anyVisible[el.getAttribute('data-group')] = true;
  });

  document.querySelectorAll('.sg-item').forEach(el => {
    const s = el.getAttribute('data-search').toLowerCase();
    el.classList.toggle('hidden', term && !s.includes(term));
  });

  GROUPS.forEach(g => {
    const ag = document.getElementById('ag-' + g.id);
    const sg = document.getElementById('sg-' + g.id);
    if (ag) ag.classList.toggle('hidden', term && !anyVisible[g.id]);
    if (sg) sg.classList.toggle('hidden', term && !anyVisible[g.id]);
    if (term && anyVisible[g.id]) sg.classList.remove('collapsed');
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

renderAll();
</script>
